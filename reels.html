<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Humbless Reels — Watch our Minecraft clips." />
    <title>Humbless Reels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Inter', sans-serif;
        touch-action: none;
      }

      /* ── Reel Container ── */
      #reel-container {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      .reel-track {
        display: flex;
        flex-direction: column;
        transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        will-change: transform;
      }

      /* ── Single Reel ── */
      .reel {
        width: 100vw;
        height: 100vh;
        flex-shrink: 0;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      .reel video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
        display: block;
      }

      /* ── Overlay gradient ── */
      .reel-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0,0,0,0.7) 0%,
          transparent 40%,
          transparent 70%,
          rgba(0,0,0,0.3) 100%
        );
        pointer-events: none;
      }

      /* ── Video info ── */
      .reel-info {
        position: absolute;
        bottom: 100px;
        left: 20px;
        right: 90px;
        pointer-events: none;
      }

      .reel-title {
        font-size: 0.9rem;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 1px 6px rgba(0,0,0,0.8);
        letter-spacing: 0.02em;
      }

      .reel-num {
        font-size: 0.7rem;
        color: rgba(255,255,255,0.5);
        margin-top: 4px;
        letter-spacing: 0.1em;
      }

      /* ── Side actions ── */
      .reel-actions {
        position: absolute;
        right: 16px;
        bottom: 110px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        color: #fff;
        cursor: pointer;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      .action-icon {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        transition: transform 0.15s, background 0.2s;
        border: 1.5px solid rgba(255,255,255,0.2);
      }

      .action-btn:active .action-icon {
        transform: scale(0.88);
      }

      .action-btn.liked .action-icon {
        background: rgba(255, 60, 80, 0.35);
        border-color: rgba(255, 60, 80, 0.6);
      }

      .action-count {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: rgba(255,255,255,0.85);
      }

      /* ── Back button ── */
      #back-btn {
        position: fixed;
        top: 20px;
        left: 16px;
        z-index: 100;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(12px);
        border: 1.5px solid rgba(255,255,255,0.2);
        border-radius: 50px;
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        padding: 10px 20px;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s, border-color 0.2s;
      }

      #back-btn:hover {
        background: rgba(255,255,255,0.12);
        border-color: rgba(255,255,255,0.5);
      }

      /* ── Reel counter ── */
      #reel-counter {
        position: fixed;
        top: 22px;
        right: 16px;
        z-index: 100;
        font-size: 0.7rem;
        font-weight: 700;
        color: rgba(255,255,255,0.5);
        letter-spacing: 0.1em;
      }

      /* ── Swipe hint ── */
      #swipe-hint {
        position: fixed;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        opacity: 1;
        transition: opacity 0.5s;
        pointer-events: none;
      }

      #swipe-hint.hidden { opacity: 0; }

      .hint-arrow {
        font-size: 1.1rem;
        color: rgba(255,255,255,0.6);
        animation: bounce 1.2s ease-in-out infinite;
      }

      .hint-text {
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        color: rgba(255,255,255,0.4);
      }

      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(6px); }
      }

      /* Like pop animation */
      @keyframes likePopAnim {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.45); }
        70%  { transform: scale(0.9); }
        100% { transform: scale(1); }
      }

      .like-pop { animation: likePopAnim 0.35s ease forwards; }
    </style>
  </head>
  <body>

    <a href="index.html" id="back-btn">← BACK</a>
    <div id="reel-counter">1 / 11</div>

    <div id="reel-container">
      <div class="reel-track" id="reel-track"></div>
    </div>

    <div id="swipe-hint">
      <div class="hint-arrow">↓</div>
      <div class="hint-text">SWIPE DOWN</div>
    </div>

    <script>
      const videos = [
        "Boogie woogie bang bang! boy.mp4",
        "Boogie woogie bang bang! copy.mp4",
        "Get Yo Money.mp4",
        "Haidilao Dance.mp4",
        "Lag na.mp4",
        "Let Hannah Open the Bottle For You.mp4",
        "Morning Be Like.mp4",
        "Spawning in the ocean be like.mp4",
        "The Boys.mp4",
        "Tip Toe.mp4",
        "Utang Nimo Ba.mp4"
      ];

      const likes = new Array(videos.length).fill(0);
      const liked = new Array(videos.length).fill(false);

      let current = 0;
      const track = document.getElementById('reel-track');
      const counter = document.getElementById('reel-counter');
      const hint = document.getElementById('swipe-hint');

      // Build reels
      videos.forEach((src, i) => {
        const reel = document.createElement('div');
        reel.className = 'reel';
        reel.id = `reel-${i}`;

        const video = document.createElement('video');
        video.src = src;
        video.loop = true;
        video.muted = false;
        video.playsInline = true;
        video.preload = 'metadata';

        const overlay = document.createElement('div');
        overlay.className = 'reel-overlay';

        const info = document.createElement('div');
        info.className = 'reel-info';
        info.innerHTML = `
          <div class="reel-title">${src.replace('.mp4', '')}</div>
          <div class="reel-num">${i + 1} of ${videos.length}</div>
        `;

        const actions = document.createElement('div');
        actions.className = 'reel-actions';
        actions.innerHTML = `
          <button class="action-btn" id="like-${i}" aria-label="Like">
            <div class="action-icon">♡</div>
            <span class="action-count" id="like-count-${i}">0</span>
          </button>
        `;

        reel.appendChild(video);
        reel.appendChild(overlay);
        reel.appendChild(info);
        reel.appendChild(actions);
        track.appendChild(reel);

        // Like button
        document.getElementById(`like-${i}`).addEventListener('click', () => {
          liked[i] = !liked[i];
          likes[i] += liked[i] ? 1 : -1;
          const btn = document.getElementById(`like-${i}`);
          const icon = btn.querySelector('.action-icon');
          const count = document.getElementById(`like-count-${i}`);
          btn.classList.toggle('liked', liked[i]);
          icon.textContent = liked[i] ? '♥' : '♡';
          count.textContent = likes[i];
          icon.classList.remove('like-pop');
          void icon.offsetWidth;
          icon.classList.add('like-pop');
        });
      });

      // Navigation
      function goTo(index) {
        if (index < 0 || index >= videos.length) return;

        // Pause current
        const prevVideo = document.querySelector(`#reel-${current} video`);
        if (prevVideo) prevVideo.pause();

        current = index;
        track.style.transform = `translateY(-${current * 100}vh)`;
        counter.textContent = `${current + 1} / ${videos.length}`;

        // Play new
        setTimeout(() => {
          const nextVideo = document.querySelector(`#reel-${current} video`);
          if (nextVideo) nextVideo.play().catch(() => {});
        }, 100);

        // Hide hint after first swipe
        if (current > 0) hint.classList.add('hidden');
      }

      // Play first video
      setTimeout(() => {
        const firstVideo = document.querySelector(`#reel-0 video`);
        if (firstVideo) firstVideo.play().catch(() => {});
      }, 300);

      // ── Touch / Mouse swipe ──
      let startY = 0;
      let dragging = false;

      function onStart(y) { startY = y; dragging = true; }
      function onEnd(y) {
        if (!dragging) return;
        dragging = false;
        const diff = startY - y;
        if (Math.abs(diff) > 50) {
          if (diff > 0) goTo(current + 1); // swipe up = next
          else          goTo(current - 1); // swipe down = prev
        }
      }

      document.addEventListener('touchstart', e => onStart(e.touches[0].clientY), { passive: true });
      document.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientY), { passive: true });

      let mouseStartY = 0;
      document.addEventListener('mousedown', e => { mouseStartY = e.clientY; });
      document.addEventListener('mouseup',   e => {
        const diff = mouseStartY - e.clientY;
        if (Math.abs(diff) > 50) {
          if (diff > 0) goTo(current + 1);
          else          goTo(current - 1);
        }
      });

      // Keyboard arrow keys
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowDown') goTo(current + 1);
        if (e.key === 'ArrowUp')   goTo(current - 1);
      });

      // Mouse wheel
      let wheelCooldown = false;
      document.addEventListener('wheel', e => {
        if (wheelCooldown) return;
        wheelCooldown = true;
        if (e.deltaY > 0) goTo(current + 1);
        else              goTo(current - 1);
        setTimeout(() => { wheelCooldown = false; }, 700);
      }, { passive: true });
    </script>
  </body>
</html>
