<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Humbless SMP — Server Map." />
    <title>Humbless SMP — Server Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Inter', sans-serif;
      }

      /* ── Top bar ── */
      #topbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 48px;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 16px;
        z-index: 100;
      }

      #back-btn {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: rgba(255,255,255,0.45);
        text-decoration: none;
        transition: color 0.2s;
      }
      #back-btn:hover { color: #fff; }

      #map-title {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.25em;
        color: rgba(255,255,255,0.25);
        text-transform: uppercase;
        flex: 1;
        text-align: center;
      }

      /* ── Map iframe ── */
      #map-wrap {
        position: fixed;
        top: 48px; left: 0; right: 0; bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #loading-msg {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .load-text {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.35em;
        color: rgba(255,255,255,0.4);
        text-transform: uppercase;
      }

      .load-dots {
        display: flex;
        gap: 10px;
      }

      .load-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255,255,255,0.5);
        animation: bounce 1.2s ease-in-out infinite;
      }
      .load-dots span:nth-child(2) { animation-delay: 0.2s; }
      .load-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes bounce {
        0%,100% { transform: translateY(0); opacity:0.3; }
        50%      { transform: translateY(-7px); opacity:1; }
      }

      #map-frame { width:100%; height:100%; border:none; display:block; }
      #shield { position:absolute; inset:0; z-index:10; background:transparent; }
    </style>
  </head>
  <body>

    <div id="topbar">
      <a href="smp.html" id="back-btn">← BACK</a>
      <div id="map-title">HUMBLESS SMP — SERVER MAP</div>
      <div style="width:60px"></div>
    </div>

    <div id="map-wrap">
      <div id="loading-msg">
        <p class="load-text">OPENING SERVER MAP...</p>
        <div class="load-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <script>
      // Disable right-click
      document.addEventListener('contextmenu', e => e.preventDefault());

      // Open map in a fullscreen popup (hides URL bar on most browsers)
      const mapWin = window.open(
        'http://humblesssssmp.ultramc.co:12012/#world:-312:0:434:5795:0:0:0:0:perspective',
        'servermap',
        'width=' + screen.width +
        ',height=' + screen.height +
        ',top=0,left=0' +
        ',toolbar=no,location=no,menubar=no,status=no,scrollbars=yes,resizable=yes'
      );

      // If popup was blocked, show a manual open button
      if (!mapWin || mapWin.closed || typeof mapWin.closed === 'undefined') {
        document.getElementById('loading-msg').innerHTML = `
          <p class="load-text" style="color:rgba(255,80,80,0.8)">POPUP BLOCKED</p>
          <p style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-top:12px;">Allow popups for this site and try again.</p>
          <button onclick="location.reload()" style="margin-top:24px;padding:12px 32px;background:#0a0a0a;border:1.5px solid rgba(255,255,255,0.25);border-radius:4px;color:#fff;font-family:Inter,sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.15em;cursor:pointer;">TRY AGAIN</button>
        `;
      } else {
        // Go back to smp page after opening the map
        setTimeout(() => { window.location.href = 'smp.html'; }, 1200);
      }
    </script>
  </body>
</html>
