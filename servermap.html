<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Humbless SMP — Server Map." />
    <title>Humbless SMP — Server Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Inter', sans-serif;
      }

      /* ── Top bar ── */
      #topbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 48px;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        padding: 0 20px;
        z-index: 100;
      }

      #back-btn {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: rgba(255,255,255,0.45);
        text-decoration: none;
        transition: color 0.2s;
      }
      #back-btn:hover { color: #fff; }

      #map-title {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.25em;
        color: rgba(255,255,255,0.25);
        text-transform: uppercase;
        flex: 1;
        text-align: center;
      }

      /* ── Map iframe ── */
      #map-wrap {
        position: fixed;
        top: 48px; left: 0; right: 0; bottom: 0;
      }

      #map-frame {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
    </style>
  </head>
  <body>

    <div id="topbar">
      <a href="smp.html" id="back-btn">← BACK</a>
      <div id="map-title">HUMBLESS SMP — SERVER MAP</div>
      <div style="width:80px"></div>
    </div>

    <div id="map-wrap">
      <iframe
        id="map-frame"
        src="/map/#world:-312:0:434:5795:0:0:0:0:perspective"
        title="Humbless SMP Server Map"
        allowfullscreen
      ></iframe>
    </div>

    <script>
      document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
  </body>
</html>
